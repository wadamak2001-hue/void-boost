apply plugin: 'com.android.application'

android {
    namespace "com.voidboost.optimizer"
    compileSdkVersion 34

    defaultConfig {
        applicationId "com.voidboost.optimizer"
        minSdkVersion 22
        targetSdkVersion 34
        versionCode 1
        versionName "1.0"
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation project(':capacitor-android')
}
